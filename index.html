<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One by One</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Courier+Prime&display=swap" rel="stylesheet">
</head>

<body>

  

  <script>

    // ─── select elements ────────────────────────────────────────────────────────
    let headline    = document.querySelector("#headline");
    let yearDisplay = document.querySelector("#year-display");
    let scrollHint  = document.querySelector("#scroll-hint");
    let si3         = document.querySelector("#si3");
    let si4         = document.querySelector("#si4");
    let d3a         = document.querySelector("#d3a");
    let d3b         = document.querySelector("#d3b");
    let d4a         = document.querySelector("#d4a");
    let d4b         = document.querySelector("#d4b");
    let blackout    = document.querySelector("#blackout");
    let endMessage  = document.querySelector("#end-message");

    let hasNavigated = false;

    // ─── get scroll percentage (0 → 1) ─────────────────────────────────────────
    function getScrollPercentage() {
      let scrolledAlready   = window.scrollY;
      let pageHeight        = document.body.scrollHeight;
      let windowHeight      = window.innerHeight;
      let possibleScrollSpace = pageHeight - windowHeight;
      return scrolledAlready / possibleScrollSpace;
    }

    // ─── clamp a value between min and max ─────────────────────────────────────
    function clamp(val, min, max) {
      if (val < min) return min;
      if (val > max) return max;
      return val;
    }

    // ─── how far through a stage are we? (0 → 1) ───────────────────────────────
    function stageProgress(p, start, end) {
      return clamp((p - start) / (end - start), 0, 1);
    }

    // ─── update one digit slot ──────────────────────────────────────────────────
    // inner  : the .slot-inner element
    // topEl  : the top .d element
    // botEl  : the bottom .d element
    // topChar: character to show on top
    // botChar: character to show on bottom
    // t      : 0 = show top digit, 1 = show bottom digit
    //
    // The inner has two children each 1em tall → inner is 2em tall.
    // translateY(-50%) = -1em → hides top, shows bottom.
    function setDigitSlot(inner, topEl, botEl, topChar, botChar, t) {
      topEl.innerText = topChar;
      botEl.innerText = botChar;
      inner.style.transform = "translateY(" + (-t * 50) + "%)";
    }

    // ─── main scroll handler ────────────────────────────────────────────────────
    window.addEventListener("scroll", function() {
      let p = getScrollPercentage();

      // headline fades out as year fades in
      if (p < 0.12) {
        headline.style.opacity   = 1;
        scrollHint.style.opacity = clamp(1 - p / 0.04, 0, 1);
      } else if (p < 0.24) {
        headline.style.opacity   = 1 - stageProgress(p, 0.12, 0.24);
        scrollHint.style.opacity = 0;
      } else {
        headline.style.opacity   = 0;
        scrollHint.style.opacity = 0;
      }

      // year fades in
      if (p < 0.18) {
        yearDisplay.style.opacity = 0;
      } else if (p < 0.30) {
        yearDisplay.style.opacity = stageProgress(p, 0.18, 0.30);
      } else {
        yearDisplay.style.opacity = 1;
      }

      // ── digit 4 (units): 5→6→7→8→9→0 ─────────────────────────────────────
      let d4pair, d4t;

      if (p < 0.33) {
        d4pair = ["5", "6"]; d4t = 0;
      } else if (p < 0.43) {
        // 5 → 6
        d4pair = ["5", "6"]; d4t = stageProgress(p, 0.33, 0.43);
      } else if (p < 0.47) {
        d4pair = ["6", "7"]; d4t = 0;
      } else if (p < 0.55) {
        // 6 → 7
        d4pair = ["6", "7"]; d4t = stageProgress(p, 0.47, 0.55);
      } else if (p < 0.59) {
        d4pair = ["7", "8"]; d4t = 0;
      } else if (p < 0.66) {
        // 7 → 8
        d4pair = ["7", "8"]; d4t = stageProgress(p, 0.59, 0.66);
      } else if (p < 0.70) {
        d4pair = ["8", "9"]; d4t = 0;
      } else if (p < 0.77) {
        // 8 → 9
        d4pair = ["8", "9"]; d4t = stageProgress(p, 0.70, 0.77);
      } else if (p < 0.81) {
        d4pair = ["9", "0"]; d4t = 0;
      } else if (p < 0.90) {
        // 9 → 0
        d4pair = ["9", "0"]; d4t = stageProgress(p, 0.81, 0.90);
      } else {
        d4pair = ["0", "0"]; d4t = 0;
      }

      // ── digit 3 (tens): 6→7, only on the final roll-over ──────────────────
      let d3pair, d3t;

      if (p < 0.81) {
        d3pair = ["6", "7"]; d3t = 0;
      } else if (p < 0.90) {
        // 6 → 7  (same window as d4's 9→0)
        d3pair = ["6", "7"]; d3t = stageProgress(p, 0.81, 0.90);
      } else {
        d3pair = ["7", "7"]; d3t = 0;
      }

      setDigitSlot(si3, d3a, d3b, d3pair[0], d3pair[1], d3t);
      setDigitSlot(si4, d4a, d4b, d4pair[0], d4pair[1], d4t);

      // ── navigate to next page ──────────────────────────────────────────────
      if (p >= 0.95 && !hasNavigated) {
        hasNavigated    = true;
        blackout.style.opacity    = 1;
        // wait for blackout, then show message
        setTimeout(function() {
          endMessage.style.opacity = 1;
        }, 1000);
        // after a pause, reload (replace with a real URL in production)
        setTimeout(function() {
          window.scrollTo({ top: 0 });
          hasNavigated = false;
          blackout.style.opacity   = 0;
          endMessage.style.opacity = 0;
        }, 3000);
      }
    });

  </script>
</body>
</html>
