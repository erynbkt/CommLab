<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div id="page">
        <h1 id="headline">one by one</h1>

        <div id="year">

            <div class="slot">
                <div class="slot-inner">
                    <div class="digit">1</div>
                    <div class="digit">1</div>
                </div>
            </div>

            <div class="slot">
                <div class="slot-inner">
                    <div class="digit">9</div>
                    <div class="digit">9</div>
                </div>
            </div>

            <div class="slot">
                <div class="slot-inner" id="second-to-last-digit-slider">
                    <div class="digit" id="second-to-last-digit-current">6</div>
                    <div class="digit" id="second-to-last-digit-next">7</div>
                </div>
            </div>

            <div class="slot">
                <div class="slot-inner" id="last-digit-slider">
                    <div class="digit" id="last-digit-current">5</div>
                    <div class="digit" id="last-digit-next">6</div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
